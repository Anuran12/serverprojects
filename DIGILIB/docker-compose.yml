
services:
  postgres:
    image: pgvector/pgvector:pg16
    command: ["postgres", "-c", "shared_preload_libraries=pg_stat_statements"]
    env_file:
      - ./.env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  pgbouncer:
    image: edoburu/pgbouncer:latest
    env_file:
      - ./.env
    environment:
      DB_USER: ${PGBOUNCER_USER}
      DB_PASSWORD: ${PGBOUNCER_PASSWORD}
      DB_HOST: ${PGBOUNCER_HOST}
      DB_NAME: ${PGBOUNCER_DB}
    volumes:
      - ./db/pgbouncer/pgbouncer.ini:/etc/pgbouncer/pgbouncer.ini:ro
      - ./db/pgbouncer/userlist.txt:/etc/pgbouncer/userlist.txt:ro
    depends_on:
      - postgres
    restart: unless-stopped

  chroma:
    image: chromadb/chroma:0.5.5
    environment:
      ALLOW_RESET: "TRUE"
      CHROMA_SERVER_HOST: "0.0.0.0"
      CHROMA_SERVER_HTTP_PORT: "8000"
    volumes:
      - chroma:/chroma/.chroma/index
    restart: unless-stopped

  backend:
    build:
      context: ./backend
    env_file:
      - ./.env
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@pgbouncer:6432/${POSTGRES_DB}
      JWT_SECRET: ${JWT_SECRET}
      AUDIT_ROOT: ${AUDIT_ROOT}
      CHROMA_HOST: ${CHROMA_HOST}
      CHROMA_PORT: ${CHROMA_PORT}
      EMBEDDING_MODEL_PATH: ${EMBEDDING_MODEL_PATH}
      REDIS_URL: ${REDIS_URL}
      RERANKER_MODEL_PATH: ${RERANKER_MODEL_PATH}
    volumes:
      - ./Audit Report:/data/audit_reports:ro
      - ./models:/models:ro
    depends_on:
      - postgres
      - chroma
      - redis
      - pgbouncer
    restart: unless-stopped

  worker:
    build:
      context: ./backend
    command: ["python", "-m", "app.worker"]
    env_file:
      - ./.env
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@pgbouncer:6432/${POSTGRES_DB}
      JWT_SECRET: ${JWT_SECRET}
      AUDIT_ROOT: ${AUDIT_ROOT}
      CHROMA_HOST: ${CHROMA_HOST}
      CHROMA_PORT: ${CHROMA_PORT}
      EMBEDDING_MODEL_PATH: ${EMBEDDING_MODEL_PATH}
      REDIS_URL: ${REDIS_URL}
      RERANKER_MODEL_PATH: ${RERANKER_MODEL_PATH}
    volumes:
      - ./Audit Report:/data/audit_reports:ro
      - ./models:/models:ro
    depends_on:
      - redis
      - postgres
      - chroma
      - pgbouncer
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    ports:
      - "127.0.0.1:8080:80"
    depends_on:
      - backend
    restart: unless-stopped

  redis:
    image: redis:7.2-alpine
    restart: unless-stopped

volumes:
  pgdata:
  chroma:
