<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - Audit DIGILIB</title>
    <link rel="stylesheet" href="styles.css" />
    <script>window.__API_BASE__ = "/api";</script>
  </head>
  <body>
    <div class="login-page">
      <div class="login-card">
        <div class="brand" style="margin-bottom: 14px;">
          <div class="brand-logo">AD</div>
          <div>
            <h1 style="margin: 0;">Audit DIGILIB</h1>
            <span>Admin & User access</span>
          </div>
        </div>
        <h2>Sign In</h2>
        <p style="color: var(--fg-muted); margin-top: 0;">
          Use your assigned credentials to access the audit search portal.
        </p>
        <label>Username</label>
        <input type="text" placeholder="Enter username" />
        <label>Password</label>
        <input type="password" placeholder="Enter password" />
        <div class="login-actions">
          <button class="btn">Forgot Password</button>
          <button class="btn primary">Login</button>
        </div>
      </div>
    </div>
    <script src="login.js"></script>
  </body>
</html>
